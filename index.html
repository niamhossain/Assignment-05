<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gihub Issues Tracker</title>
    <!-- Google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>
    <!-- daisy ui -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

        <style>
            *{
                font-family: "Geist", sans-serif;
            }
        </style>
</head>
<body class="bg-[#F8FAFC]">
    <main>
        <!-- login section -->
        <section class="h-screen flex justify-center items-center">
                    <fieldset class="fieldset rounded-box p-4 bg-white shadow-lg w-[520px] rounded-lg">
                        <div class="mx-auto text-center pb-6">
                            <img class="mx-auto pt-8" src="./assets/github-logo.png" alt="">
                            <h1 class="text-2xl font-semibold pt-6 pb-1">GitHub Issues Tracker</h1>
                            <p class="text-gray-500">Sign in to manage your issues</p>
                        </div>
                        <label class="label font-medium text-[#1F2937] ml-6">Username</label>
                        <input type="text" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="    Enter Username" />
                        <p class="text-primary ml-6">Default: admin</p>
        
                        <label class="label font-medium text-[#1F2937] ml-6">Password</label>
                        <input type="password" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="    Enter Password" />
                        <p class="text-primary pb-6 ml-6">Default: admin123</p>
        
                        <button class="btn btn-primary bg-[#4A00FF] text-white mx-auto border border-gray-300 rounded-lg w-11/12">Sign in</button>
                        <div class="flex items-center py-6">
                            <hr class="w-1/2 mx-4">
                            <p>OR</p>
                            <hr class="w-1/2 mx-4">
                        </div>
                        <p class="text-center text-[#64748B] pb-2">Demo Credentials:</p>
                        <div class="bg-base-200 text-center py-6 w-11/12 mx-auto">
                            <p><span class="font-semibold">Username: </span>admin</p>
                            <p><span class="font-semibold">Password: </span>admin123</p>
                        </div>
                    </fieldset>
        </section>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gihub Issues Tracker</title>
    <!-- Google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy ui -->     
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

        <style>
            *{
                font-family: "Geist", sans-serif;
            }
        </style>
</head>
<body>
    <main class="pb-6">
        <!-- login section -->
        <section id="loginSect" class="h-screen flex justify-center items-center bg-base-200">
                    <fieldset class="fieldset rounded-box p-4 bg-white shadow-lg w-[520px] rounded-lg">
                        <div class="mx-auto text-center pb-6">
                            <img class="mx-auto pt-8" src="./assets/github-logo.png" alt="">
                            <h1 class="text-2xl font-semibold pt-6 pb-1">GitHub Issues Tracker</h1>
                            <p class="text-gray-500">Sign in to manage your issues</p>
                        </div>
                        <label class="label font-medium text-[#1F2937] ml-6">Username</label>
                        <input id="userName" type="text" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="Enter Username" />
                        <p class="text-primary ml-6">Default: admin</p>
        
                        <label class="label font-medium text-[#1F2937] ml-6">Password</label>
                        <input id="passWord" type="password" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="Enter Password" />
                        <p class="text-primary pb-6 ml-6">Default: admin123</p>
        
                        <button id="btnLogin" class="btn btn-primary text-white mx-auto border border-gray-300 rounded-lg w-11/12">Sign in</button>
                        <div class="flex items-center py-6">
                            <hr class="w-1/2 mx-4">
                            <p>OR</p>
                            <hr class="w-1/2 mx-4">
                        </div>
                        <p class="text-center text-[#64748B] pb-2">Demo Credentials:</p>
                        <div class="bg-base-200 text-center py-6 w-11/12 mx-auto">
                            <p><span class="font-semibold">Username: </span>admin</p>
                            <p><span class="font-semibold">Password: </span>admin123</p>
                        </div>
                    </fieldset>
        </section>
        <!-- Navbar -->
         <section class="primarySects hidden">
            <header class="w-11/12 mx-auto">
                <div class="navbar">
            <div class="flex-1 flex flex-col sm:flex-row items-center gap-2">
                <p>
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                </p>
                <p>
                    GitHub Issues Tracker
                </p>
            </div>
            <div class="flex gap-4 relative flex-col sm:flex-row">
                <span id="searchBtn" class="cursor-pointer"><i class="fa-solid fa-magnifying-glass absolute left-3 top-7 sm:top-3 sm:left-7 z-50 text-gray-400"></i></span>
                <input id="searchData" type="text" placeholder="Search  issues..." class="input input-bordered border border-gray-300 w-24 md:w-auto pl-10" />
                <div>
                <button class="btn btn-primary">+ New Issues</button>
                </div>
            </div>
            </div>
            </header>
            <hr class="border-t-[1px] border-gray-200">
         </section>
         <!-- main body Section -->
          <section class="w-9/12 mx-auto primarySects hidden">
                <!-- three buttons -->
                <div class="bg-base-100 shadow-sm flex gap-4 mt-14 p-6 flex-col sm:flex-row items-center">
                    <button id="allBtn" class="btn btn-primary w-28 btnSect">All</button>
                    <button id="openBtn" class="btn w-28 btnSect">Open</button>
                    <button id="closedBtn" class="btn w-28 btnSect">Closed</button>
                </div>
                <!--Live Issues tracking -->
                <div class="bg-base-100 shadow-sm mt-4 p-6 flex justify-between flex-col sm:flex-row items-center">
                    <div class="flex items-center gap-2">
                        <div class="rounded-full bg-[#ECE4FF] p-2">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h1 class="font-semibold text-xl">50 issues</h1>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-6 items-center">
                        <p><i class="fa-solid fa-circle" style="color: rgb(99, 230, 190);"></i>  open</p>
                        <p><i class="fa-solid fa-circle" style="color: rgb(177, 151, 252);"></i>  closed</p>
                    </div>    
                </div>
          </section>
          <!--Cards Section -->
          <section id="allSect" class="hidden grid xl:grid-cols-4 lg:grid-cols-3 md:grid-cols-2 gap-y-3 w-9/12 mx-auto pt-6 bg-base-200 shadow-md primarySects pb-4">
          </section>
          <section id="spinner" class="flex justify-center items-center p-20 hidden">
            <span class="loading loading-bar loading-xl"></span>
          </section>

          <!-- Open the modal using ID.showModal() method -->
                        <dialog id="modal" class="modal modal-bottom sm:modal-middle">
                        <div class="modal-box">
                            <div id="modalData"></div>
                            <div class="modal-action">
                            <form method="dialog">
                                <button class="btn">Close</button>
                            </form>
                            </div>
                        </div>
                        </dialog>

    </main>
    <script src="./function.js"></script>
</body>
</html>

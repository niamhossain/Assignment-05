<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gihub Issues Tracker</title>
    <!-- Google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy ui -->     
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

        <style>
            *{
                font-family: "Geist", sans-serif;
            }
        </style>
</head>
<body>
    <main>
        <!-- login section -->
        <section class="h-screen flex justify-center items-center bg-base-200 hidden">
                    <fieldset class="fieldset rounded-box p-4 bg-white shadow-lg w-[520px] rounded-lg">
                        <div class="mx-auto text-center pb-6">
                            <img class="mx-auto pt-8" src="./assets/github-logo.png" alt="">
                            <h1 class="text-2xl font-semibold pt-6 pb-1">GitHub Issues Tracker</h1>
                            <p class="text-gray-500">Sign in to manage your issues</p>
                        </div>
                        <label class="label font-medium text-[#1F2937] ml-6">Username</label>
                        <input type="text" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="Enter Username" />
                        <p class="text-primary ml-6">Default: admin</p>
        
                        <label class="label font-medium text-[#1F2937] ml-6">Password</label>
                        <input type="password" class="input mx-auto border border-gray-300 rounded-lg w-11/12" placeholder="Enter Password" />
                        <p class="text-primary pb-6 ml-6">Default: admin123</p>
        
                        <button class="btn btn-primary text-white mx-auto border border-gray-300 rounded-lg w-11/12">Sign in</button>
                        <div class="flex items-center py-6">
                            <hr class="w-1/2 mx-4">
                            <p>OR</p>
                            <hr class="w-1/2 mx-4">
                        </div>
                        <p class="text-center text-[#64748B] pb-2">Demo Credentials:</p>
                        <div class="bg-base-200 text-center py-6 w-11/12 mx-auto">
                            <p><span class="font-semibold">Username: </span>admin</p>
                            <p><span class="font-semibold">Password: </span>admin123</p>
                        </div>
                    </fieldset>
        </section>
        <!-- Navbar -->
         <section>
            <header class="w-11/12 mx-auto">
                <div class="navbar">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="w-9" src="./assets/github-logo.png" alt=""> GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-4 relative">
                <span><i class="fa-solid fa-magnifying-glass absolute top-3 left-7 z-50 text-gray-400"></i></span>
                <input type="text" placeholder="       Search  issues..." class="input input-bordered border border-gray-300 w-24 md:w-auto" />
                <div>
                <button class="btn btn-primary">+ New Issues</button>
                </div>
            </div>
            </div>
            </header>
            <hr class="border-t-[1px] border-gray-200">
         </section>
         <!-- All Section -->
          <section class="w-9/12 mx-auto">
                <!-- three buttons -->
                <div class="bg-base-100 shadow-sm flex gap-4 mt-14 p-6">
                    <button class="btn btn-primary w-28">All</button>
                    <button class="btn w-28">Open</button>
                    <button class="btn w-28">Closed</button>
                </div>
                <!--Live Issues tracking -->
                <div class="bg-base-100 shadow-sm mt-4 p-6 flex justify-between">
                    <div class="flex items-center gap-2">
                        <div class="rounded-full bg-[#ECE4FF] p-2">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h1 class="font-semibold text-xl">50 issues</h1>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-6 items-center">
                        <p><i class="fa-solid fa-circle" style="color: rgb(99, 230, 190);"></i>  open</p>
                        <p><i class="fa-solid fa-circle" style="color: rgb(177, 151, 252);"></i>  closed</p>
                    </div>    
                </div>
          </section>
    </main>
</body>
</html>
